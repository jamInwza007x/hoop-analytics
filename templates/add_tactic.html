{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card bg-dark border-warning shadow-lg">
            <div class="card-header bg-warning text-dark"><h4 class="mb-0 fw-bold">Add New Basketball Tactic</h4></div>
            <div class="card-body text-white">
                <form action="{{ url_for('add_tactic') }}" method="POST">
                    <div class="mb-3"><label class="form-label">Tactic Name</label><input type="text" name="name" class="form-control bg-secondary text-white border-0" required></div>
                    <div class="mb-3"><label class="form-label">Type</label>
                        <select name="type" class="form-select bg-secondary text-white border-0"><option value="Offense">Offense ⚔️</option><option value="Defense">Defense 🛡️</option></select>
                    </div>
                    <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control bg-secondary text-white border-0" rows="3" required></textarea></div>
                    <div class="mb-3"><label class="form-label">Strengths</label><input type="text" name="strength" class="form-control bg-secondary text-white border-0"></div>
                    <div class="mb-3"><label class="form-label">Weaknesses</label><input type="text" name="weakness" class="form-control bg-secondary text-white border-0"></div>
                    <div class="d-grid gap-2"><button type="submit" class="btn btn-warning fw-bold">Save Tactic 🏀</button></div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
