{% extends "base.html" %}
{% block content %}
<div class="row mt-4">
    <div class="col-md-6"><h2 class="text-warning fw-bold">Hoop Playbook 📋</h2></div>
    <div class="col-md-6 text-md-end"><a href="{{ url_for('add_tactic') }}" class="btn btn-warning fw-bold">+ Add New Tactic</a></div>
</div>
<div class="mt-3 mb-4">
    <a href="{{ url_for('playbook') }}" class="btn btn-outline-light btn-sm">All</a>
    <a href="{{ url_for('playbook', type='Offense') }}" class="btn btn-outline-warning btn-sm">Offense ⚔️</a>
    <a href="{{ url_for('playbook', type='Defense') }}" class="btn btn-outline-info btn-sm">Defense 🛡️</a>
</div>
<div class="row">
    {% for tactic in tactics %}
    <div class="col-md-4 mb-4">
        <div class="card bg-dark border-secondary h-100 shadow">
            <div class="card-body">
                <h5 class="card-title text-warning fw-bold">{{ tactic.name }}</h5>
                <p class="card-text text-light text-truncate">{{ tactic.description }}</p>
                <div class="d-flex justify-content-between mt-3">
                    <a href="{{ url_for('tactic_detail', id=tactic.id) }}" class="btn btn-sm btn-outline-light">View Details</a>
                    <form action="{{ url_for('delete_tactic', id=tactic.id) }}" method="POST" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('ลบไหม?')">Delete 🗑️</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
