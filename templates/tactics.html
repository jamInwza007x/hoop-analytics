{% extends "base.html" %}
{% block content %}
<div class="row mt-4">
    <div class="col-md-6"><h2 class="text-warning fw-bold"><i class="fa-solid fa-book-journal-whills"></i> Hoop Playbook</h2></div>
    <div class="col-md-6 text-md-end"><a href="{{ url_for('add_tactic') }}" class="btn btn-warning fw-bold"><i class="fa-solid fa-plus"></i> Add New Tactic</a></div>
</div>
<div class="mt-4 mb-4">
    <a href="{{ url_for('playbook') }}" class="btn btn-outline-light btn-sm px-4">All</a>
    <a href="{{ url_for('playbook', type='Offense') }}" class="btn btn-outline-success btn-sm px-4"><i class="fa-solid fa-khanda"></i> Offense</a>
    <a href="{{ url_for('playbook', type='Defense') }}" class="btn btn-outline-info btn-sm px-4"><i class="fa-solid fa-shield-halved"></i> Defense</a>
</div>
<div class="row g-4">
    {% for tactic in tactics %}
    <div class="col-md-4">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title text-warning fw-bold">{{ tactic.name }}</h5>
                <span class="badge {{ 'bg-success' if tactic.type == 'Offense' else 'bg-info' }} mb-2">{{ tactic.type }}</span>
                <p class="card-text text-light text-truncate">{{ tactic.description }}</p>
                <hr class="border-secondary">
                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('tactic_detail', id=tactic.id) }}" class="btn btn-sm btn-outline-info"><i class="fa-solid fa-eye"></i> View</a>
                    <a href="{{ url_for('edit_tactic', id=tactic.id) }}" class="btn btn-sm btn-outline-warning"><i class="fa-solid fa-pen"></i> Edit</a>
                    <form action="{{ url_for('delete_tactic', id=tactic.id) }}" method="POST" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('ลบแผนนี้ใช่ไหม?')"><i class="fa-solid fa-trash"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center mt-5"><h4 class="text-muted">No tactics found. Start drawing your plays!</h4></div>
    {% endfor %}
</div>
{% endblock %}
